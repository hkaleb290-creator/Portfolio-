<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Kaleb Harris</title>
  <style>
    :root { --bg:#f5f4f0; --ink:#1a1a18; --accent:#c8441a; --muted:#9a9990; --border:#d8d6d0; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--ink); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .card { width:min(700px,92vw); border:1px solid var(--border); padding:2rem; background:#fff; }
    .eyebrow { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:1rem; }
    h1 { margin:0 0 .8rem; font-size:2.2rem; line-height:1; }
    p { color:var(--muted); line-height:1.8; margin:.4rem 0 1.4rem; }
    a { display:inline-block; text-decoration:none; border:1px solid var(--border); color:var(--ink); padding:.65rem 1rem; font-size:11px; letter-spacing:.08em; text-transform:uppercase; }
    a:hover { border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">404 · Not Found</p>
    <h1>This page doesn’t exist.</h1>
    <p>The link may be outdated or typed incorrectly. Use the button below to return to the portfolio home page.</p>
    <a href="/Portfolio-/">Go to Portfolio Home</a>
  </main>
</body>
</html>
